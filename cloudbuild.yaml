steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/carsxe-next/carsxe-mcp-server:$COMMIT_SHA
      - -t
      - gcr.io/carsxe-next/carsxe-mcp-server:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, gcr.io/carsxe-next/carsxe-mcp-server]

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - carsxe-mcp-staging
      - --image=gcr.io/carsxe-next/carsxe-mcp-server:$COMMIT_SHA
      - --project=carsxe-next
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=STAGING=true,CARSXE_AUTH_URL=https://api.carsxe.com/v1/auth/validate

images:
  - gcr.io/carsxe-next/carsxe-mcp-server:$COMMIT_SHA
  - gcr.io/carsxe-next/carsxe-mcp-server:latest
